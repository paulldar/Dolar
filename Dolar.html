<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poldar Exchange - Light Calc</title>
    <style>
        :root { 
            --primary-blue: #0056b3; 
            --silver: #95a5a6; 
            --success: #27ae60; 
            --bg-light: #f8f9fa;
            --card-bg: #ffffff;
        }
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-light); 
            color: #333; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .wrapper { 
            width: 100%; 
            max-width: 420px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            border: 1px solid #e1e4e8; 
            margin-top: 20px; 
        }
        h1 { color: var(--primary-blue); text-align: center; font-size: 1.5rem; margin-bottom: 5px; }
        .sub { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .input-box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #444; }
        input { 
            width: 100%; 
            background: #fff; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            padding: 16px; 
            color: #222; 
            font-size: 1.4rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.2s; 
            -webkit-appearance: none; 
        }
        input:focus { border-color: var(--primary-blue); background: #fff; box-shadow: 0 0 8px rgba(0,86,179,0.1); }
        .b-border { border-right: 10px solid var(--primary-blue); }
        .w-border { border-right: 10px solid var(--silver); }
        
        .total-card { 
            background: linear-gradient(135deg, #0056b3, #007bff); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            margin-top: 10px; 
            color: #fff; 
            box-shadow: 0 4px 15px rgba(0,86,179,0.2);
        }
        .total-card small { font-size: 0.85rem; font-weight: 500; opacity: 0.9; }
        .total-card span { display: block; font-size: 2.2rem; font-weight: 800; }
        
        .auto-exp { 
            margin-top: 25px; 
            background: #f1f3f5; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 0.9rem; 
            line-height: 1.6; 
            border-right: 5px solid var(--primary-blue); 
            color: #444;
        }
        .val-hl { color: var(--primary-blue); font-weight: bold; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>حاسبة الحصص المالية</h1>
    <p class="sub">نظام توزيع العملة (70% أزرق / 30% أبيض)</p>

    <div class="input-box">
        <label>🔵 دولار أزرق (70%):</label>
        <input type="number" id="blue" class="b-border" placeholder="0" oninput="calculate('b')">
    </div>

    <div class="input-box">
        <label>⚪ دولار أبيض (30%):</label>
        <input type="number" id="white" class="w-border" placeholder="0" oninput="calculate('w')">
    </div>

    <div class="total-card">
        <small>إجمالي مبلغ العملية (100%)</small>
        <span id="total">0.00 $</span>
    </div>

    <div id="status" class="auto-exp">
        <b>💡 شرح العملية الحسابية:</b><br>
        أدخل المبالغ في الخانات أعلاه، وسيقوم النظام بتوزيع الحصص تلقائياً لضمان دقة النسبة المطلوبة.
    </div>
</div>

<script>
    function calculate(source) {
        const bField = document.getElementById('blue');
        const wField = document.getElementById('white');
        const tField = document.getElementById('total');
        const sField = document.getElementById('status');

        let b = parseFloat(bField.value);
        let w = parseFloat(wField.value);

        if (source === 'b' && b > 0) {
            w = (b / 70) * 30;
            wField.value = w.toFixed(2);
        } else if (source === 'w' && w > 0) {
            b = (w / 30) * 70;
            bField.value = b.toFixed(2);
        }

        const total = (parseFloat(bField.value) || 0) + (parseFloat(wField.value) || 0);
        tField.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " $";

        if (total > 0) {
            sField.innerHTML = `<b>تقرير الحساب:</b><br>` +
                `لإتمام عملية بمبلغ <span class="val-hl">${total.toLocaleString()} $</span>:<br>` +
                `- حصة الأزرق (70%): <span class="val-hl">${parseFloat(bField.value).toLocaleString()} $</span><br>` +
                `- حصة الأبيض (30%): <span class="val-hl">${parseFloat(wField.value).toLocaleString()} $</span>`;
        }
    }
</script>

</body>
</html>
